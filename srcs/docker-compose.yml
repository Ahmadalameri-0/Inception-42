services:
  mariadb:
    secrets:
      - db_root_password
      - db_password
    volumes:
      - mariadb_data:/var/lib/mysql
    env_file:
      - .env
    networks:
      - inception
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: always

  wordpress:
    secrets:
      - db_password
      - credentials
    depends_on:
      - mariadb
    volumes:
      - wordpress_data:/var/www/html
    env_file:
      - .env
    networks:
      - inception
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: always

  nginx:
    depends_on:
      - wordpress
    env_file:
      - .env
    networks:
      - inception
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    restart: always

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ahmadlameri/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ahmadlameri/data/wordpress

secrets:
  db_password:
    file: ../secrets/db_password.txt

  db_root_password:
    file: ../secrets/db_root_password.txt
  
  credentials:
    file: ../secrets/credentials.txt

networks:
  inception:
    driver: bridge
